interface:
  display_name: "JDD Buzzword"
  short_description: "코드, 버그, 설계 결함을 자신감 넘치는 JDD 용어로 포장합니다."
  triggers:
    - "JDD 스타일로"
    - "주둥아리로"
    - "있어보이게"
    - "이거 어떻게 포장하지"
    - "어떻게 변명하지"
    - "뇌절 모드"
    - "buzzword"
  default_prompt: "Use $jdd-buzzword to reframe this code, bug, or design choice in confident JDD language."
  examples:
    - user: "콜백 지옥인데 어떻게 포장하지"
      response_hint: "CPS(Continuation Passing Style) 기반 제어 흐름 설계"
    - user: "테스트 코드가 하나도 없어"
      response_hint: "REPL-verified behavior, 고도화 단계에서 자동화 예정"
    - user: "validation set 안 만들고 전부 학습에 넣었는데"
      response_hint: "maximum data utilization strategy"
    - user: "기획이 3번 바뀌었는데 개발자 탓이래"
      response_hint: "agile requirement evolution"
