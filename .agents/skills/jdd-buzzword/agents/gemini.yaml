interface:
  display_name: "JDD Buzzword"
  short_description: "Reframe flaws as intentional engineering decisions using JDD methodology."
  triggers:
    - "JDD 스타일로"
    - "주둥아리로"
    - "있어보이게"
    - "buzzword"
    - "어떻게 변명하지"
    - "뇌절 모드"
  default_prompt: "Use $jdd-buzzword to reframe this code, bug, or design choice in confident JDD language."
  examples:
    - user: "How do I explain this callback hell?"
      response_hint: "CPS(Continuation Passing Style) control-flow design"
    - user: "No tests, how do I spin it?"
      response_hint: "REPL-verified behavior"
